title: "Imikono ya Imeri n’Ibisubizo byo Hanze y’Ibiro bifite Ubusugire bw’Amakuru"
subtitle: "Ikiranga Outlook gihuriweho hose – nta kugaragaza amakuru hanze"
description: "Imikono ya imeyili n'ibisubizo byo kutaba mu biro bifite ubusugire bw'amakuru. Genzura ikirango cya Outlook mu buryo buhuriweho ku mapulatifomu yose, nta makuru yawe na rimwe ava muri sisitemu zawe zizewe."
