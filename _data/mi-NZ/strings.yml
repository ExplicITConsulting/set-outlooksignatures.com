title: "Waitohu Īmēra me Ngā Whakautu Waho i te Tari Mana Raraunga"
subtitle: "Waitohu Outlook kotahi i ngā wāhi katoa – kāore he whakaaturanga raraunga ki waho"
description: "Ngā Waitohu Īmēra me ngā Whakautu Kei Waho i te Tari e Rangatiratanga Raraunga ana. Whakahaerehia te waitohu Outlook ki te pokapū puta noa i ngā tūāpapa katoa, me te kore rawa e wehe ō raraunga i ō pūnaha pono."
