<!-- Add html hash to language switcher links -->
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    // Define a function to handle the link updates
    const updateLanguageLinks = () => {
      const currentHash = window.location.hash;
      const languageLinks = document.querySelectorAll('a[data-base-url]');

      languageLinks.forEach(link => {
        const baseHref = link.getAttribute('data-base-url');
        link.href = baseHref + currentHash;
      });
    };

    // Initial call when the DOM is ready
    updateLanguageLinks();

    // Listen for hash changes and update the links again
    window.addEventListener('hashchange', updateLanguageLinks);
  });
</script>

<!-- Scrolling banner for signature images and customer imageshtml  -->
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const shuffleArray = (array) => {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    };

    const waitForImages = async (root) => {
      const imgs = Array.from(root.querySelectorAll('img'));
      await Promise.all(imgs.map(img => {
        // If already complete, decode might still help stabilize layout
        if (img.decode) {
          return img.decode().catch(() => { });
        }
        if (img.complete) return Promise.resolve();
        return new Promise(resolve => {
          img.addEventListener('load', resolve, { once: true });
          img.addEventListener('error', resolve, { once: true });
        });
      }));
    };

    const initSafeBanner = async (trackSelector, endpoint, pxPerSec) => {
      const track = document.querySelector(trackSelector);
      if (!track) return;

      try {
        const response = await fetch(endpoint);
        const text = await response.text();
        let urls = text.split('\n').map(l => l.trim()).filter(Boolean);
        urls = shuffleArray(urls);

        const fragment = document.createDocumentFragment();
        const doubledUrls = [...urls, ...urls];

        doubledUrls.forEach(urlPath => {
          const img = new Image();
          img.src = urlPath;

          // IMPORTANT: avoid lazy here; lazy-loading changes scrollWidth later => visible jumps
          img.loading = "eager";
          img.decoding = "async";

          const baseName = urlPath.split('/').pop();
          const nameWithoutExt = baseName.replace(/\.[^.]+$/, "");
          const firstPart = nameWithoutExt.split(' ')[0];
          const hasDomain = firstPart.includes('.');

          const finalDomain = hasDomain ? firstPart : "explicitconsulting.at";
          const finalAlt = hasDomain ? nameWithoutExt : "explicitconsulting.at anonymous customer";
          img.alt = finalAlt;

          const link = document.createElement('a');
          link.href = `https://www.${finalDomain}`;
          link.target = "_blank";
          link.rel = "noopener noreferrer";
          link.className = "no-external-link-icon banner-link";

          link.appendChild(img);
          fragment.appendChild(link);
        });

        track.appendChild(fragment);

        const applyAnimationVars = () => {
          // Remove + re-add class to restart cleanly if recalculated
          track.classList.remove('is-animating');

          // Force layout
          const totalWidth = track.scrollWidth;
          if (!totalWidth || totalWidth <= 0) return false;

          const halfWidth = totalWidth / 2;

          // Lock pixel distance (rounded helps subpixel drift)
          track.style.setProperty('--track-width', `${Math.round(halfWidth)}px`);

          const duration = halfWidth / pxPerSec;
          track.style.setProperty('--duration', `${duration}s`);

          // Ensure CSS variables are applied before starting animation
          void track.offsetWidth;
          requestAnimationFrame(() => track.classList.add('is-animating'));
          return true;
        };

        // Wait until images are decoded/loaded so width is stable
        await waitForImages(track);

        // Start animation once stable
        if (!applyAnimationVars()) {
          // fallback retry if something still not measurable
          setTimeout(() => applyAnimationVars(), 100);
        }

        // Optional but recommended: keep stable on resize / zoom / font swap
        const ro = new ResizeObserver(() => {
          // Debounce via rAF
          requestAnimationFrame(() => applyAnimationVars());
        });
        ro.observe(track);

        // If fonts can affect layout (less likely here, but safe):
        if (document.fonts && document.fonts.ready) {
          document.fonts.ready.then(() => applyAnimationVars()).catch(() => { });
        }

      } catch (e) {
        console.error("Banner error:", e);
      }
    };

    initSafeBanner(
      '.customer-scrolling-track',
      'https://set-outlooksignatures.com/customer-images.txt',
      60
    );

    initSafeBanner(
      '.signature-scrolling-track',
      'https://set-outlooksignatures.com/signature-images.txt',
      60
    );
  });
</script>


<!-- Update download links to latest release of Set-OutlookSignatures -->
<script>
  async function updateDownloadLink() {
    const owner = 'Set-OutlookSignatures';
    const repo = 'Set-OutlookSignatures';
    const repoURL = `https://api.github.com/repos/${owner}/${repo}/releases/latest`;

    try {
      const response = await fetch(repoURL);
      if (!response.ok) {
        throw new Error(`GitHub API request failed with status: ${response.status}`);
      }

      const data = await response.json();
      const firstAsset = data.assets[0];

      if (firstAsset && firstAsset.browser_download_url) {
        const downloadLinks = document.querySelectorAll('.sos-download-link');
        if (downloadLinks.length > 0) {
          downloadLinks.forEach(link => {
            link.href = firstAsset.browser_download_url;
          });
        } else {
          // console.warn('No elements with class "sos-download-link" found.');
        }
      } else {
        console.error('No assets found for the latest release.');
      }
    } catch (error) {
      console.error('Error fetching latest release:', error);
    }
  }

  document.addEventListener('DOMContentLoaded', updateDownloadLink);
</script>

<script>
  /**
   * Standalone script for lazy loading the background image and applying
   * a dark mode filter based on system preference.
   */
  (function () {
    // Use DOMContentLoaded check if you place the script in the <head>
    // If placed before the closing </body> tag, a simple check is usually sufficient.
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initBackgroundLogic);
    } else {
      initBackgroundLogic();
    }

    function initBackgroundLogic() {
      const html = document.documentElement;

      // 1. Lazy Load: Add the 'loaded' class to trigger background-image loading via CSS.
      html.classList.add('loaded');

      const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');

      const updateDarkMode = (event) => {
        // event.matches is true if dark mode is preferred
        if (event.matches) {
          html.classList.add('dark-mode-bg');
        } else {
          html.classList.remove('dark-mode-bg');
        }
      };

      // 2. Initial check: Apply the correct state immediately on load.
      updateDarkMode(mediaQuery);

      // 3. Watch for changes in system preference.
      // This is more efficient than polling or unnecessary timers.
      mediaQuery.addEventListener('change', updateDarkMode);
    }
  })();
</script>


<!-- Open <details> tags when addressed directly via a URL fragment -->
<script>
  function openTargetedDetails() {
    // Get the current hash from the URL (e.g., #procurement-outsourcer)
    const hash = window.location.hash;

    if (hash) {
      // Find the element with that ID
      const element = document.querySelector(hash);

      // Check if it exists and is a <details> element
      if (element && element.tagName.toLowerCase() === 'details') {
        element.open = true; // Open it!

        // Optional: Smoothly scroll to the element once opened
        element.scrollIntoView({ behavior: 'smooth' });
      }
    }
  }

  // Run when the page initially loads
  window.addEventListener('DOMContentLoaded', openTargetedDetails);

  // Run if the user clicks a link to a different anchor while already on the page
  window.addEventListener('hashchange', openTargetedDetails);
</script>

<!-- Add line numbers to multi-line Rouge code blocks -->
<script>
  document.addEventListener("DOMContentLoaded", () => {
    document
      .querySelectorAll("div.highlighter-rouge code, figure.highlight code")
      .forEach((code) => {
        if (code.dataset.lineNumbersApplied === "true") return;

        const block = code.closest("div.highlighter-rouge, figure.highlight");

        // Keep original source before line wrapping changes the DOM
        const rawSource = code.textContent.replace(/\r?\n$/, "");

        if (block && !block.querySelector(".code-copy-button")) {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "code-copy-button";
          button.setAttribute("aria-label", "Copy code");
          button.title = "Copy code";
          button.textContent = "⧉";

          button.addEventListener("click", async () => {
            try {
              await navigator.clipboard.writeText(rawSource);
              button.classList.add("is-copied");
              button.textContent = "✓";

              window.setTimeout(() => {
                button.classList.remove("is-copied");
                button.textContent = "⧉";
              }, 1200);
            } catch {
              const textarea = document.createElement("textarea");
              textarea.value = rawSource;
              textarea.setAttribute("readonly", "");
              textarea.style.position = "fixed";
              textarea.style.left = "-9999px";
              document.body.appendChild(textarea);
              textarea.select();
              document.execCommand("copy");
              document.body.removeChild(textarea);

              button.classList.add("is-copied");
              button.textContent = "✓";

              window.setTimeout(() => {
                button.classList.remove("is-copied");
                button.textContent = "⧉";
              }, 1200);
            }
          });

          block.appendChild(button);
        }

        const originalText = code.textContent;
        const hadTrailingNewline = /\r?\n$/.test(originalText);

        const lines = [createLine()];

        function createLine() {
          const span = document.createElement("span");
          span.className = "code-line";
          return span;
        }

        function currentLine() {
          return lines[lines.length - 1];
        }

        function newLine() {
          lines.push(createLine());
        }

        function appendTextWithWrappers(text, wrappers) {
          if (text === "") return;

          const parts = text.split(/(\s+)/).filter((part) => part.length > 0);

          parts.forEach((part) => {
            let parent = currentLine();

            wrappers.forEach((wrapper) => {
              const clone = wrapper.cloneNode(false);
              parent.appendChild(clone);
              parent = clone;
            });

            const span = document.createElement("span");

            if (/^\s+$/.test(part)) {
              span.className = "code-space";
            } else {
              span.className = "code-chunk";
            }

            span.textContent = part;
            parent.appendChild(span);
          });
        }

        function walk(node, wrappers = []) {
          if (node.nodeType === Node.TEXT_NODE) {
            const parts = node.nodeValue.split(/\r?\n/);

            parts.forEach((part, index) => {
              if (index > 0) newLine();
              appendTextWithWrappers(part, wrappers);
            });

            return;
          }

          if (node.nodeType === Node.ELEMENT_NODE) {
            const nextWrappers = wrappers.concat(node);

            Array.from(node.childNodes).forEach((child) => {
              walk(child, nextWrappers);
            });
          }
        }

        Array.from(code.childNodes).forEach((child) => {
          walk(child);
        });

        if (
          hadTrailingNewline &&
          lines.length > 1 &&
          lines[lines.length - 1].textContent === ""
        ) {
          lines.pop();
        }

        code.style.setProperty(
          "--line-number-digits",
          String(String(lines.length).length)
        );

        if (lines.length <= 0) {
          code.classList.add("single-line-code");
          lines[0].classList.add("code-line-single");
        }

        lines.forEach((line) => {
          if (line.textContent === "") {
            line.innerHTML = "&nbsp;";
          }
        });

        code.replaceChildren(...lines);
        code.dataset.lineNumbersApplied = "true";
      });
  });
</script>


<!-- Click/tap content images to show them in a full-viewport lightbox -->
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const zoomableImageSelector = [
      '.content img:not(.no-image-zoom)',
      '.content picture:not(.no-image-zoom) img:not(.no-image-zoom)'
    ].join(',');

    const excludedContainersSelector = [
      '.customer-scrolling-banner',
      '.signature-scrolling-banner',
      '.customer-scrolling-track',
      '.signature-scrolling-track'
    ].join(',');

    const lightbox = document.createElement('div');
    lightbox.className = 'image-lightbox';
    lightbox.setAttribute('role', 'dialog');
    lightbox.setAttribute('aria-modal', 'true');
    lightbox.setAttribute('aria-label', 'Enlarged image');

    const lightboxImage = document.createElement('img');
    lightboxImage.alt = '';
    lightbox.appendChild(lightboxImage);
    document.body.appendChild(lightbox);

    let previouslyFocusedElement = null;

    const closeLightbox = () => {
      lightbox.classList.remove('is-active');
      document.body.classList.remove('image-lightbox-open');
      lightboxImage.removeAttribute('src');
      lightboxImage.alt = '';

      if (previouslyFocusedElement) {
        previouslyFocusedElement.focus({ preventScroll: true });
        previouslyFocusedElement = null;
      }
    };

    const openLightbox = (img) => {
      // currentSrc is important for <picture>, because it resolves to the
      // currently active source, e.g. your light/dark SVG variant.
      const imageSource = img.currentSrc || img.src;
      if (!imageSource) return;

      previouslyFocusedElement = document.activeElement;

      lightboxImage.src = imageSource;
      lightboxImage.alt = img.alt || '';
      lightbox.classList.add('is-active');
      document.body.classList.add('image-lightbox-open');
      lightbox.focus({ preventScroll: true });
    };

    lightbox.tabIndex = -1;

    lightbox.addEventListener('click', closeLightbox);

    document.addEventListener('keydown', (event) => {
      if (!lightbox.classList.contains('is-active')) return;

      if (event.key === 'Escape') {
        closeLightbox();
      }
    });

    document.querySelectorAll(zoomableImageSelector).forEach((img) => {
      if (img.closest(excludedContainersSelector)) return;
      if (img.classList.contains('no-image-zoom')) return;

      img.tabIndex = 0;
      img.setAttribute('role', 'button');

      if (!img.getAttribute('aria-label')) {
        img.setAttribute(
          'aria-label',
          img.alt ? `Open image: ${img.alt}` : 'Open image'
        );
      }

      img.addEventListener('click', (event) => {
        // If an image is inside a normal link, prefer zoom behavior.
        // Add class="no-image-zoom" to that image if you want the link to win.
        event.preventDefault();
        openLightbox(img);
      });

      img.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          openLightbox(img);
        }
      });
    });
  });
</script>
