<!-- Add html hash to language switcher links -->
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    // Define a function to handle the link updates
    const updateLanguageLinks = () => {
      const currentHash = window.location.hash;
      const languageLinks = document.querySelectorAll('a[data-base-url]');

      languageLinks.forEach(link => {
        const baseHref = link.getAttribute('data-base-url');
        link.href = baseHref + currentHash;
      });
    };

    // Initial call when the DOM is ready
    updateLanguageLinks();

    // Listen for hash changes and update the links again
    window.addEventListener('hashchange', updateLanguageLinks);
  });
</script>

<!-- Scrolling banner for signature images and customer imageshtml  -->
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const shuffleArray = (array) => {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    };

    const initSafeBanner = async (trackSelector, endpoint) => {
      const track = document.querySelector(trackSelector);
      if (!track) return;

      try {
        const response = await fetch(endpoint);
        const text = await response.text();
        let urls = text.split('\n').map(l => l.trim()).filter(Boolean);

        urls = shuffleArray(urls);

        const fragment = document.createDocumentFragment();
        urls.forEach(urlPath => {
          const img = new Image();
          img.src = urlPath;
          img.loading = "lazy";

          const baseName = urlPath.split('/').pop();
          const nameWithoutExt = baseName.replace(/\.[^.]+$/, "");
          const firstPart = nameWithoutExt.split(' ')[0];
          const hasDomain = firstPart.includes('.');

          let finalDomain = hasDomain ? firstPart : "explicitconsulting.at";
          let finalAlt = hasDomain ? nameWithoutExt : "explicitconsulting.at anonymous customer";

          img.alt = finalAlt;

          const link = document.createElement('a');
          link.href = `https://www.${finalDomain}`;
          link.target = "_blank";
          link.rel = "noopener noreferrer";
          link.className = "no-external-link-icon banner-link";

          link.appendChild(img);
          fragment.appendChild(link);
        });

        track.appendChild(fragment);

        const startStepping = () => {
          // Wir lesen die Gap einmal aus dem CSS aus (z.B. "32px")
          const computedStyle = window.getComputedStyle(track);
          const gap = parseInt(computedStyle.gap) || 0;

          setInterval(() => {
            // Pause bei Hover auf dem Container (Banner)
            if (track.parentElement.matches(':hover')) return;

            const firstItem = track.firstElementChild;
            if (!firstItem) return;

            // Dynamische Berechnung: Bildbreite + CSS Gap
            const stepWidth = firstItem.offsetWidth + gap;

            // Sanftes Gleiten (1.2s Dauer)
            track.style.transition = "transform 1.2s cubic-bezier(0.45, 0.05, 0.55, 0.95)";
            track.style.transform = `translateX(-${stepWidth}px)`;

            // Reset nach der Animation
            setTimeout(() => {
              track.style.transition = "none";
              track.style.transform = "translateX(0)";
              track.appendChild(firstItem); // Schiebt das erste Element nach hinten
            }, 1250); 
          }, 2000); // Alle 5 Sekunden ein Schritt
        };

        // Startverzögerung, damit die Bilder Zeit zum Laden haben
        setTimeout(startStepping, 2000);

      } catch (e) { console.error("Banner error:", e); }
    };

    initSafeBanner('.customer-scrolling-track', 'https://set-outlooksignatures.com/customer-images.txt');
    initSafeBanner('.signature-scrolling-track', 'https://set-outlooksignatures.com/signature-images.txt');
  });
</script>


<!-- Update download links to latest release of Set-OutlookSignatures -->
<script>
  async function updateDownloadLink() {
    const owner = 'Set-OutlookSignatures';
    const repo = 'Set-OutlookSignatures';
    const repoURL = `https://api.github.com/repos/${owner}/${repo}/releases/latest`;

    try {
      const response = await fetch(repoURL);
      if (!response.ok) {
        throw new Error(`GitHub API request failed with status: ${response.status}`);
      }

      const data = await response.json();
      const firstAsset = data.assets[0];

      if (firstAsset && firstAsset.browser_download_url) {
        const downloadLinks = document.querySelectorAll('.sos-download-link');
        if (downloadLinks.length > 0) {
          downloadLinks.forEach(link => {
            link.href = firstAsset.browser_download_url;
          });
        } else {
          // console.warn('No elements with class "sos-download-link" found.');
        }
      } else {
        console.error('No assets found for the latest release.');
      }
    } catch (error) {
      console.error('Error fetching latest release:', error);
    }
  }

  document.addEventListener('DOMContentLoaded', updateDownloadLink);
</script>

<script>
  /**
   * Standalone script for lazy loading the background image and applying
   * a dark mode filter based on system preference.
   */
  (function () {
    // Use DOMContentLoaded check if you place the script in the <head>
    // If placed before the closing </body> tag, a simple check is usually sufficient.
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initBackgroundLogic);
    } else {
      initBackgroundLogic();
    }

    function initBackgroundLogic() {
      const html = document.documentElement;

      // 1. Lazy Load: Add the 'loaded' class to trigger background-image loading via CSS.
      html.classList.add('loaded');

      const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');

      const updateDarkMode = (event) => {
        // event.matches is true if dark mode is preferred
        if (event.matches) {
          html.classList.add('dark-mode-bg');
        } else {
          html.classList.remove('dark-mode-bg');
        }
      };

      // 2. Initial check: Apply the correct state immediately on load.
      updateDarkMode(mediaQuery);

      // 3. Watch for changes in system preference.
      // This is more efficient than polling or unnecessary timers.
      mediaQuery.addEventListener('change', updateDarkMode);
    }
  })();
</script>
