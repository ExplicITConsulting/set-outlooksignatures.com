<script>

<!-- Add html hash to language switcher links -->
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    // Define a function to handle the link updates
    const updateLanguageLinks = () => {
      const currentHash = window.location.hash;
      const languageLinks = document.querySelectorAll('a[data-base-url]');

      languageLinks.forEach(link => {
        const baseHref = link.getAttribute('data-base-url');
        link.href = baseHref + currentHash;
      });
    };

    // Initial call when the DOM is ready
    updateLanguageLinks();

    // Listen for hash changes and update the links again
    window.addEventListener('hashchange', updateLanguageLinks);
  });
</script>


<!-- Code for delete button in notifications -->
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    (document.querySelectorAll('.notification .delete') || []).forEach(($delete) => {
      const $notification = $delete.parentNode;

      $delete.addEventListener('click', () => {
        $notification.parentNode.removeChild($notification);
      });
    });
  });
</script>


<!-- Scrolling banner for signature images and customer imageshtml  -->
<script>
document.addEventListener('DOMContentLoaded', () => {
  // Desired constant speeds (px per second)
  const SPEEDS = {
    customer: 60,    // adjust to taste
    signature: 80
  };

  initMarquee(
    '.customer-scrolling-banner',
    '.customer-scrolling-track',
    'https://set-outlooksignatures.com/customer-images.txt',
    SPEEDS.customer
  );

  initMarquee(
    '.signature-scrolling-banner',
    '.signature-scrolling-track',
    'https://set-outlooksignatures.com/signature-images.txt',
    SPEEDS.signature
  );

  async function initMarquee(bannerSel, trackSel, endpoint, speedPxPerSec) {
    const banners = document.querySelectorAll(bannerSel);
    if (!banners.length) return;

    let urls = [];
    try {
      const res = await fetch(endpoint, { cache: 'no-store' });
      if (!res.ok) return;
      const text = await res.text();
      urls = [...new Set(text.split('\n').map(l => l.trim()).filter(Boolean))];
    } catch (e) {
      console.error(`Error loading ${endpoint}:`, e);
      return;
    }

    // Slightly shuffle to avoid always same start
    urls.sort(() => Math.random() - 0.5);

    banners.forEach(banner => {
      const track = banner.querySelector(trackSel);
      if (!track) return;

      track.textContent = '';

      // Build Row A
      const rowA = document.createElement('div');
      rowA.className = 'row A';

      const imgsA = urls.map(url => {
        const img = document.createElement('img');
        img.src = url;
        img.alt = 'Logo/Template';
        img.decoding = 'async';
        img.loading = 'lazy';          // lazy required
        img.fetchPriority = 'low';
        img.referrerPolicy = 'no-referrer';
        img.draggable = false;
        rowA.appendChild(img);
        return img;
      });

      // Row B = exact clone of A
      const rowB = rowA.cloneNode(true);
      rowB.className = 'row B';
      rowB.setAttribute('aria-hidden', 'true');

      track.appendChild(rowA);
      track.appendChild(rowB);

      const imgsB = rowB.querySelectorAll('img');

      // Visibility gate: only (re)calc when visible to avoid width=0
      const io = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            recalcSeamless(track, rowA, imgsA, imgsB, speedPxPerSec);
          } else {
            // optional: pause when off-screen to save energy
            track.classList.remove('is-ready');
          }
        });
      }, { root: null, threshold: 0.01 });
      io.observe(banner);

      // Recalc on each A-image load (lazy images will decode over time)
      imgsA.forEach(img => {
        img.addEventListener('load', () => {
          // batch with rAF to avoid multiple layouts
          requestAnimationFrame(() => recalcSeamless(track, rowA, imgsA, imgsB, speedPxPerSec));
        });
      });

      // Recalc on container resize (heights change -> widths change)
      const ro = new ResizeObserver(() => {
        requestAnimationFrame(() => recalcSeamless(track, rowA, imgsA, imgsB, speedPxPerSec));
      });
      ro.observe(banner);
    });
  }

  function recalcSeamless(track, rowA, imgsA, imgsB, speedPxPerSec) {
    // 1) Read current translateX (to resume seamlessly)
    let tx = 0;
    const t = getComputedStyle(track).transform;
    if (t && t !== 'none') {
      try { tx = new DOMMatrix(t).m41; } catch {}
    }

    // 2) Lock per-image widths from A into B (keeps A == B even if B is lazy)
    imgsA.forEach((imgA, i) => {
      const w = imgA.getBoundingClientRect().width;
      if (w > 0 && imgsB[i]) {
        imgA.style.width = `${w}px`;
        imgsB[i].style.width = `${w}px`;
      }
    });

    // 3) Measure width of A (distance per loop)
    const rowAWidth = rowA.getBoundingClientRect().width;
    if (rowAWidth <= 0) return; // not yet measurable

    // 4) Constant speed: duration = distance / pxPerSec
    const pxPerSec = Math.max(1, speedPxPerSec || 60);
    const durationSec = rowAWidth / pxPerSec;

    // 5) Compute progress based on current transform to keep position on update
    let progressPx = (-tx) % rowAWidth;
    if (progressPx < 0) progressPx += rowAWidth;
    const progressFraction = progressPx / rowAWidth;
    const negativeDelaySec = -progressFraction * durationSec;

    // 6) Apply variables and seamless restart
    track.style.setProperty('--rowA-width', `${rowAWidth.toFixed(3)}px`);
    track.style.setProperty('--loop-duration', `${durationSec.toFixed(3)}s`);
    track.style.setProperty('--neg-delay', `${negativeDelaySec.toFixed(3)}s`);

    // Re-arm the animation without dropping infinite
    // (avoid using the 'animation' shorthand to prevent resetting sub-properties)
    track.classList.add('is-ready');
  }
});
</script>


<!-- Update download links to latest release of Set-OutlookSignatures -->
<script>
  async function updateDownloadLink() {
    const owner = 'Set-OutlookSignatures';
    const repo = 'Set-OutlookSignatures';
    const repoURL = `https://api.github.com/repos/${owner}/${repo}/releases/latest`;

    try {
      const response = await fetch(repoURL);
      if (!response.ok) {
        throw new Error(`GitHub API request failed with status: ${response.status}`);
      }

      const data = await response.json();
      const firstAsset = data.assets[0];

      if (firstAsset && firstAsset.browser_download_url) {
        const downloadLinks = document.querySelectorAll('.sos-download-link');
        if (downloadLinks.length > 0) {
          downloadLinks.forEach(link => {
            link.href = firstAsset.browser_download_url;
          });
        } else {
          // console.warn('No elements with class "sos-download-link" found.');
        }
      } else {
        console.error('No assets found for the latest release.');
      }
    } catch (error) {
      console.error('Error fetching latest release:', error);
    }
  }

  document.addEventListener('DOMContentLoaded', updateDownloadLink);
</script>

<script>
  /**
   * Standalone script for lazy loading the background image and applying
   * a dark mode filter based on system preference.
   */
  (function () {
    // Use DOMContentLoaded check if you place the script in the <head>
    // If placed before the closing </body> tag, a simple check is usually sufficient.
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initBackgroundLogic);
    } else {
      initBackgroundLogic();
    }

    function initBackgroundLogic() {
      const html = document.documentElement;

      // 1. Lazy Load: Add the 'loaded' class to trigger background-image loading via CSS.
      html.classList.add('loaded');

      const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');

      const updateDarkMode = (event) => {
        // event.matches is true if dark mode is preferred
        if (event.matches) {
          html.classList.add('dark-mode-bg');
        } else {
          html.classList.remove('dark-mode-bg');
        }
      };

      // 2. Initial check: Apply the correct state immediately on load.
      updateDarkMode(mediaQuery);

      // 3. Watch for changes in system preference.
      // This is more efficient than polling or unnecessary timers.
      mediaQuery.addEventListener('change', updateDarkMode);
    }
  })();
</script>
