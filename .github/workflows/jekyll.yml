# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3"
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically
          cache-version: 0 # Increment this number if you need to re-download cached gems
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        # Outputs to the './_site' directory by default
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
      - name: Minify Assets
        uses: devatherock/minify-js@v3.1.0
        with:
          directory: "_site"
          add_suffix: false # Required: prevents index.html -> index.min.html
          # Optional: Use regex to exclude specific folders if needed
          # exclusions: '.*vendor/.*'
      - name: Inject Minified HTML into LLM files (pwsh)
        shell: pwsh
        run: |
          $siteRoot = Resolve-Path "_site"

          Get-ChildItem -Path $siteRoot -Recurse -Filter "llms-full.txt" | ForEach-Object {
            Write-Host "Processing $($_.FullName)..."

            $content = Get-Content $_.FullName -Raw

            $content = [regex]::Replace(
              $content,
              '\[REPLACE_WITH_CONTENT:(.*?)\]',
              {
                param($m)

                Write-Host "  $($m.Value)"

                $rel = $m.Groups[1].Value.Trim()
                if ([string]::IsNullOrWhiteSpace($rel)) { return "" }

                $htmlPath = Join-Path $siteRoot (([uri]$rel).localPath).TrimStart('/')

                if ($htmlPath.EndsWith('/')) {
                  $htmlPath = Join-Path $htmlPath "index.html"
                } elseIf (-not $htmlPath.EndsWith('.html')) {
                  $htmlPath += ".html"
                }

                if (-not (Test-Path $htmlPath -PathType Leaf)) {
                  Write-Host "    File not found: '$($htmlPath)'"
                } else {
                  Write-Host "    Injecting from: '$($htmlPath)'"
                }

                Get-Content $htmlPath -Raw
              },
              'Singleline'
            )

            Set-Content $_.FullName $content -NoNewline
          }
      - name: Prettify LLM Files
        run: |
          npx prettier --parser markdown --prose-wrap always --print-width 0 --write "_site/**/llms.txt" "_site/**/llms-full.txt"
      - name: Setup IndexNow
        # Generate the verification file and place it inside the _site directory,
        # which is the output directory Jekyll uses.
        run: echo ${{ secrets.INDEXNOW_KEY }} > _site/${{ secrets.INDEXNOW_KEY }}.txt
      - name: Upload artifact
        # Automatically uploads an artifact from the './_site' directory by default
        uses: actions/upload-pages-artifact@v3

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
