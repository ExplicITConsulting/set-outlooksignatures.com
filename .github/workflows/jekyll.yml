# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3"
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically
          cache-version: 0 # Increment this number if you need to re-download cached gems
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        # Outputs to the './_site' directory by default
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
      - name: Minify Assets
        uses: devatherock/minify-js@v3.1.0
        with:
          directory: "_site"
          add_suffix: false # Required: prevents index.html -> index.min.html
          # Optional: Use regex to exclude specific folders if needed
          # exclusions: '.*vendor/.*'
      - name: Inject Minified HTML into LLM files
        run: |
          # 1. Create a simplified perl script
          cat << 'EOF' > inject_html.pl
          my $txt_file = $ARGV[0];
          undef $/; 
          open my $f, '<', $txt_file or die $!;
          my $data = <$f>;
          close $f;

          # The replacement logic
          $data =~ s|\[REPLACE_WITH_CONTENT:(.*?)\]|
            $url = $1;
            $url =~ s|^https?://[^/]+||; # Strip domain
            
            $path = "_site" . $url;
            $path =~ s|//+|/|g; 

            if ($path =~ m|/$| || -d $path) {
              $path .= "/index.html";
              $path =~ s|//+|/|g;
            }

            if (-e $path) {
              my $content = do {
                local $/;
                open my $fh, '<', $path or return "!! Error reading $path !!";
                <$fh>;
              };
              $content;
            }
          |ge;

          open my $wf, '>', $txt_file or die $!;
          print $wf $data;
          close $wf;
          EOF

          # 2. Run it against all llms-full.txt files found
          find _site -name "llms-full.txt" | while read file; do
            echo "Processing $file..."
            perl inject_html.pl "$file"
          done

          rm inject_html.pl
      - name: Setup IndexNow
        # Generate the verification file and place it inside the _site directory,
        # which is the output directory Jekyll uses.
        run: echo ${{ secrets.INDEXNOW_KEY }} > _site/${{ secrets.INDEXNOW_KEY }}.txt
      - name: Upload artifact
        # Automatically uploads an artifact from the './_site' directory by default
        uses: actions/upload-pages-artifact@v3

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
