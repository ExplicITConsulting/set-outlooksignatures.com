# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

  # Every day at 02:37 o'clock Austrian time
  schedule:
    - cron: "37 2 * * *"
      timezone: "Europe/Vienna"

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3" # Not needed with a .ruby-version file
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically
          cache-version: 0 # Increment this number if you need to re-download cached gems
      - name: Setup Node
        uses: actions/setup-node@v4
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Generate Mermaid SVG files (batch)
        shell: bash
        run: |
          set -euo pipefail

          DIR="assets/images/mermaid-svg"
          shopt -s nullglob

          # 1. Create the Puppeteer config file on the host
          echo '{ "args": ["--no-sandbox", "--disable-setuid-sandbox"] }' > puppeteer-config.json

          # 2. Force plain text progress logging for Docker image pull info
          export BUILDKIT_PROGRESS=plain

          # 3. Run Docker using /bin/sh and discover the node local binary path dynamically
          docker run --rm \
            -u "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}:/data" \
            --entrypoint /bin/sh \
            ghcr.io/mermaid-js/mermaid-cli/mermaid-cli \
            -c '
              set -eu

              DIR="assets/images/mermaid-svg"
              
              # Safely locate the local node binary path relative to the user'\''s home folder
              MMDC_BIN="/home/mermaidcli/node_modules/.bin/mmdc"
              if [ ! -f "$MMDC_BIN" ]; then
                # Fallback check if it was installed in a different relative npm scope
                MMDC_BIN=$(find /home/mermaidcli -name mmdc -type f -print -quit 2>/dev/null || true)
              fi

              if [ -z "$MMDC_BIN" ] || [ ! -f "$MMDC_BIN" ]; then
                echo "Error: Could not dynamically locate mmdc within /home/mermaidcli." >&2
                exit 1
              fi
              
              total_files=0
              for file in "$DIR"/*.mmd; do
                [ -e "$file" ] || continue
                total_files=$((total_files + 1))
              done

              if [ "$total_files" -eq 0 ]; then
                echo "No .mmd files found to process."
                exit 0
              fi

              current=0
              for file in "$DIR"/*.mmd; do
                [ -e "$file" ] || continue
                current=$((current + 1))
                percent=$(( current * 100 / total_files ))
                
                base=$(echo "$file" | sed "s/\.mmd$//")
                light="${base}-light.svg"
                dark="${base}-dark.svg"

                echo "[${current}/${total_files}] (${percent}%) Processing: ${file}"

                # --- LIGHT ---
                if [ -f "$light" ]; then
                  echo "  -> Skipping existing $light"
                else
                  "$MMDC_BIN" -p /data/puppeteer-config.json -i "/data/$file" -o "/data/$light" -t default
                fi

                # --- DARK ---
                if [ -f "$dark" ]; then
                  echo "  -> Skipping existing $dark"
                else
                  "$MMDC_BIN" -p /data/puppeteer-config.json -i "/data/$file" -o "/data/$dark" -t dark
                fi
              done
            '

          # 4. Clean up the config file
          rm puppeteer-config.json
      - name: Build with Jekyll
        # Outputs to the './_site' directory by default
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
      - name: Inject Minified HTML into LLM files (pwsh)
        shell: pwsh
        run: |
          $siteRoot = Resolve-Path "_site"

          Get-ChildItem -Path $siteRoot -Recurse -Filter "llms-full.txt" | ForEach-Object {
            Write-Host "Processing $($_.FullName)..."

            $content = Get-Content $_.FullName -Raw

            $content = [regex]::Replace(
              $content,
              '\[REPLACE_WITH_CONTENT:(.*?)\]',
              {
                param($m)

                Write-Host "  $($m.Value)"

                $rel = $m.Groups[1].Value.Trim()
                if ([string]::IsNullOrWhiteSpace($rel)) { return "" }

                $htmlPath = Join-Path $siteRoot (([uri]$rel).localPath).TrimStart('/')

                if ($htmlPath.EndsWith('/')) {
                  $htmlPath = Join-Path $htmlPath "index.html"
                } elseIf (-not $htmlPath.EndsWith('.html')) {
                  $htmlPath += ".html"
                }

                if (-not (Test-Path $htmlPath -PathType Leaf)) {
                  Write-Host "    File not found: '$($htmlPath)'"
                } else {
                  Write-Host "    Injecting from: '$($htmlPath)'"
                }

                Get-Content $htmlPath -Raw
              },
              'Singleline'
            )

            Set-Content $_.FullName $content -NoNewline
          }
      - name: Setup IndexNow
        # Generate the verification file and place it inside the _site directory,
        # which is the output directory Jekyll uses.
        run: echo ${{ secrets.INDEXNOW_KEY }} > _site/${{ secrets.INDEXNOW_KEY }}.txt
      - name: Upload artifact
        # Automatically uploads an artifact from the './_site' directory by default
        uses: actions/upload-pages-artifact@v3

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
