name: Deploy Jekyll site and Notify Search Engines

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "37 2 * * *"
      timezone: "Europe/Vienna"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 1. Build job: Compiles Jekyll and prepares artifacts
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3"
          bundler-cache: true
          cache-version: 0

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Inject Minified HTML into LLM files (pwsh)
        shell: pwsh
        run: |
          $siteRoot = Resolve-Path "_site"

          Get-ChildItem -Path $siteRoot -Recurse -Filter "llms-full.txt" | ForEach-Object {
            Write-Host "Processing $($_.FullName)..."

            $content = Get-Content $_.FullName -Raw

            $content = [regex]::Replace(
              $content,
              '\[REPLACE_WITH_CONTENT:(.*?)\]',
              {
                param($m)

                Write-Host "  $($m.Value)"

                $rel = $m.Groups[1].Value.Trim()
                if ([string]::IsNullOrWhiteSpace($rel)) { return "" }

                $htmlPath = Join-Path $siteRoot (([uri]$rel).localPath).TrimStart('/')

                if ($htmlPath.EndsWith('/')) {
                  $htmlPath = Join-Path $htmlPath "index.html"
                } elseIf (-not $htmlPath.EndsWith('.html')) {
                  $htmlPath += ".html"
                }

                if (-not (Test-Path $htmlPath -PathType Leaf)) {
                  Write-Host "    File not found: '$($htmlPath)'"
                } else {
                  Write-Host "    Injecting from: '$($htmlPath)'"
                }

                Get-Content $htmlPath -Raw
              },
              'Singleline'
            )

            Set-Content $_.FullName $content -NoNewline
          }

      - name: Setup IndexNow Key
        run: echo ${{ secrets.INDEXNOW_KEY }} > _site/${{ secrets.INDEXNOW_KEY }}.txt

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  # 2. Deploy job: Pushes the build to GitHub Pages
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # 3. Notification job: Alerts Google and other Search Engines
  notify-search-engines:
    runs-on: ubuntu-latest
    needs: deploy # Only runs after a successful deployment
    steps:
      - name: Submit to Google & Baidu
        uses: 3Alan/search-engines-urls-push@v0.2.3
        with:
          site: ${{ secrets.SITE }}
          sitemap: ${{ secrets.SITEMAP }}
          google-client-email: ${{ secrets.GOOGLE_CLIENT_EMAIL }}
          google-private-key: ${{ secrets.GOOGLE_PRIVATE_KEY }}

      - name: Submit to IndexNow (Bing/Yandex)
        uses: bojieyang/indexnow-action@v2
        with:
          limit: 1000
          sitemap-location: ${{ secrets.SITEMAP }}
          key: ${{ secrets.INDEXNOW_KEY }}
          lastmod-required: false
