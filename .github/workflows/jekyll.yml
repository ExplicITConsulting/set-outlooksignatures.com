# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

  # Every day at 02:37 o'clock Austrian time
  schedule:
    - cron: "37 2 * * *"
      timezone: "Europe/Vienna"

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3" # Not needed with a .ruby-version file
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically
          cache-version: 0 # Increment this number if you need to re-download cached gems
      - name: Setup Node
        uses: actions/setup-node@v4
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Generate Mermaid SVG files (batch)
        shell: bash
        run: |
          set -euo pipefail

          DIR="assets/images/mermaid-svg"

          # 1. Graceful exit if directory is missing
          if [ ! -d "$DIR" ]; then
            echo "Directory $DIR does not exist. Skipping rendering."
            exit 0
          fi

          # 2. Install mermaid-cli along with the ELK layout engine plugin
          echo "Installing @mermaid-js/mermaid-cli and @mermaid-js/layout-elk..."
          npm install @mermaid-js/mermaid-cli @mermaid-js/layout-elk

          # 3. Explicitly pull the specific browser binary tied to this installation
          echo "Installing matching chrome-headless-shell browser..."
          npx puppeteer browsers install chrome-headless-shell

          # 4. Create the Puppeteer config file
          echo '{"args":["--no-sandbox","--disable-setuid-sandbox","--disable-gpu"]}' > puppeteer-config.json

          # 5. Locate files
          shopt -s nullglob
          files=("$DIR"/*.mmd)
          total_files=${#files[@]}

          if [ "$total_files" -eq 0 ]; then
            echo "No .mmd files found in $DIR. Skipping rendering."
            rm -f puppeteer-config.json
            exit 0
          fi

          echo "Found $total_files files to process."

          # 6. Main processing loop
          current=0
          for file in "${files[@]}"; do
            current=$((current + 1))
            percent=$((current * 100 / total_files))
            
            base="${file%.mmd}"
            light="${base}-light.svg"
            dark="${base}-dark.svg"

            echo "[${current}/${total_files}] (${percent}%) Processing: ${file}"

            # --- LIGHT PASS ---
            if [ -f "$light" ]; then
              echo "  -> Skipping existing $light"
            else
              ./node_modules/.bin/mmdc \
                -p puppeteer-config.json \
                -i "$file" \
                -o "$light" \
                -t default
            fi

            # --- DARK PASS ---
            if [ -f "$dark" ]; then
              echo "  -> Skipping existing $dark"
            else
              ./node_modules/.bin/mmdc \
                -p puppeteer-config.json \
                -i "$file" \
                -o "$dark" \
                -t dark \
                -b "#000000"
            fi
          done

          # 7. Cleanup configurations
          rm -f puppeteer-config.json
      - name: Build with Jekyll
        # Outputs to the './_site' directory by default
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
      - name: Install Node Processing Dependencies
        run: npm install cheerio turndown

      - name: Inject Clean Markdown into LLM files (Node.js)
        shell: node {0}
        run: |
          const fs = require('fs');
          const path = require('path');
          const cheerio = require('cheerio');
          const TurndownService = require('turndown');

          const siteRoot = path.resolve('_site');
          const llmsFullFile = path.join(siteRoot, 'llms-full.txt');

          if (!fs.existsSync(llmsFullFile)) {
            console.error('❌ Error: llms-full.txt was not found in _site.');
            process.exit(1);
          }

          console.log(`Processing file: ${llmsFullFile}...`);
          let content = fs.readFileSync(llmsFullFile, 'utf8');

          // Initialize Turndown with ATX headers (# Style) and Fenced Code Blocks (``` Style)
          const turndownService = new TurndownService({ 
            headingStyle: 'atx', 
            codeBlockStyle: 'fenced' 
          });

          // Match the URL inside [REPLACE_WITH_CONTENT:...]
          const regex = /\[REPLACE_WITH_CONTENT:(.*?)\]/g;

          content = content.replace(regex, (match, urlStr) => {
            try {
              const cleanUrl = urlStr.trim();
              if (!cleanUrl) return '';

              // 1. Safely parse the absolute URL string to extract the local pathname
              const parsedUrl = new URL(cleanUrl);
              let localPath = parsedUrl.pathname;

              let htmlPath = path.join(siteRoot, localPath);

              // 2. Dual-Path Fail-Safe Resolution for Jekyll Clean URLs vs File Outputs
              if (htmlPath.endsWith('/')) {
                htmlPath = path.join(htmlPath, 'index.html');
              } else if (!htmlPath.endsWith('.html')) {
                if (fs.existsSync(htmlPath + '.html')) {
                  htmlPath += '.html';
                } else if (fs.existsSync(path.join(htmlPath, 'index.html'))) {
                  htmlPath = path.join(htmlPath, 'index.html');
                } else {
                  htmlPath += '.html'; // Final structural fallback
                }
              }

              // Guard check for missing pages
              if (!fs.existsSync(htmlPath)) {
                console.warn(`⚠️ Warning: HTML file missing at physical destination: ${htmlPath}`);
                return '';
              }

              console.log(` -> Injecting & Transpiling: ${localPath}`);
              const htmlRaw = fs.readFileSync(htmlPath, 'utf8');
              
              // 3. Parse Document Object Model (DOM) using Cheerio
              const $ = cheerio.load(htmlRaw);

              // 4. Dom Sanitization: Strip out intra-page navigation noise before compiling Markdown
              $('.anchor-link').remove();              // Drops the 🔗 emojis and local header anchor tags
              $('script, style, noscript').remove();    // Safety sweep for accidental leakages

              // 5. Container Targeting Strategy
              const targetHtml = $('main').html() || $('.content').html() || $('body').html();
              if (!targetHtml) return '';

              // 6. Convert the HTML slice to clean Markdown
              let cleanMarkdown = turndownService.turndown(targetHtml).trim();

              // 7. Isolation Guard: Wrap in an explicit 10-backtick block to prevent inner-code collisions
              return [
                '### CONTENT (as clean Markdown)',
                '``````````markdown',
                cleanMarkdown,
                '``````````'
              ].join('\n');

            } catch (err) {
              console.error(`❌ Error parsing placeholder link [${urlStr}]:`, err.message);
              return '';
            }
          });

          // Write out unified UTF-8 payload back to output directory
          fs.writeFileSync(llmsFullFile, content, 'utf8');
          console.log('🎉 Successfully completed llms-full.txt Markdown conversion pipeline!');
      - name: Setup IndexNow
        # Generate the verification file and place it inside the _site directory,
        # which is the output directory Jekyll uses.
        run: echo ${{ secrets.INDEXNOW_KEY }} > _site/${{ secrets.INDEXNOW_KEY }}.txt
      - name: Upload artifact
        # Automatically uploads an artifact from the './_site' directory by default
        uses: actions/upload-pages-artifact@v3

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
